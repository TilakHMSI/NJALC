<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.DispatchReleaseWithoutRepairIn"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
                PGM=DispatchUnlock
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit2">
                {{mg.getValue(mgc.Edit2) }}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label3"
                class="lable_overflow"
            >
                Dispatch Stop (Unlock)
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <div
                [magic]="mgc.V_Mode"
                (change)="task.mgOnRadioSelectionChanged(mgc.V_Mode)"
            >
                <div *ngFor="let o of mg.getItemListValues(mgc.V_Mode);">
                    <label>
                        <input
                            type="radio"
                            [formControlName]="mgc.V_Mode"
                            [value]="o.index"
                        />
                        {{o.displayValue}}
                    </label>
                </div>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.V_Proeed">
                {{mg.getValue(mgc.V_Proeed)}}
            </button>
            <button [magic]="mgc.btnexit">
                {{mg.getValue(mgc.btnexit)}}
            </button>
        </div>
    </div>
</div>
