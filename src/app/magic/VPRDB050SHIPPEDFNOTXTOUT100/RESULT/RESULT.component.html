<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.RESULT">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                          RESULT
                        </label></h3>
                  
                    <div class="d-flex align-items-center">
  
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                          
                               <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date From</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Edit2"
                            [magic]="mgc.Edit2" dateInput />

                                </div>
                            </div>
                             <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date To</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Edit4"
                            [magic]="mgc.Edit4" dateInput />

                                </div>
                            </div>
   
        <div class="col-lg-12">
                    <div class="form-group-sm">
                        <label class="lbl-sm">OUTPUT FILE NAME</label>
                        <input [formControlName]="mgc.Edit6" [magic]="mgc.Edit6" class="form-control-ed"
                            mgFormat />
                        <mgError [magic]="mgc.Edit6"> </mgError>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label class="lbl-sm">DATA COUNT</label>
                        <input [formControlName]="mgc.V_COUNT_V" [magic]="mgc.V_COUNT_V" class="form-control-ed"
                            mgFormat />
                        <mgError [magic]="mgc.V_COUNT_V"> </mgError>
                    </div>
                </div>

   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.btn_Exit"
                                             [disabled]="mg.isDisabled(mgc.btn_Exit )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                OK
                                            </button>
                                            

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
