<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.VPRDB018MODELREORG">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                      MODEL RE ORG
                        </label></h3>
                           
                                  <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.V_LOCATE_P" [magic]="mgc.V_LOCATE_P" mgFormat />
           
               
      
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
               PGM=VPRDB018
            </label>
                  
                    <div class="d-flex align-items-center">
                           <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicDate : mgc.Edit3}}
            </label>
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4)
| magicTime : mgc.Edit4}}
            </label>
        </div>
                   
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                                                  <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label class="lbl-sm">Passage month number: Month</label>
                        <input [formControlName]="mgc.PASSAGE_MONTH_V" [magic]="mgc.PASSAGE_MONTH_V" class="form-control-ed"
                            mgFormat />
                        <mgError [magic]="mgc.PASSAGE_MONTH_V"> </mgError>
                    </div>
                </div>
      
     <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Passage Date</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.V_PASSAGE_DATE_V"
                            [magic]="mgc.V_PASSAGE_DATE_V" dateInput />

                                </div>
                            </div>

                
    

   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.BUTTONEXEC"
                                             [disabled]="mg.isDisabled(mgc.BUTTONEXEC )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                           EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.BUTTONCANCEL"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                       CANCEL
                                            </button>

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
