<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.VPRDB018MODELREORG"
    >
        <div style="display: flex; flex-direction: row">
            <div>
                <input
                    [formControlName]="mgc.V_LOCATE_P"
                    [magic]="mgc.V_LOCATE_P"
                    mgFormat
                />
                <mgError [magic]=mgc.V_LOCATE_P> </mgError>
            </div>
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                PGM=VPRDB018
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.btnexit">
                Back
            </button>
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicDate : mgc.Edit3}}
            </label>
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4)
| magicTime : mgc.Edit4}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label5"
                class="lable_overflow"
            >
                Passage month number:
            </label>
            <div>
                <input
                    [formControlName]="mgc.PASSAGE_MONTH_V"
                    type='number'
                    [magic]="mgc.PASSAGE_MONTH_V"
                    mgFormat
                    rangevalidator
                />
                <mgError [magic]=mgc.PASSAGE_MONTH_V> </mgError>
            </div>
            <label
                [magic]="mgc.Label7"
                class="lable_overflow"
            >
                month
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                Passage Date :
            </label>
            <input
                type="date"
                [formControlName]="mgc.V_PASSAGE_DATE_V"
                [magic]="mgc.V_PASSAGE_DATE_V"
                dateInput
            />
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.BUTTONEXEC">
                {{mg.getValue(mgc.BUTTONEXEC)}}
            </button>
            <button [magic]="mgc.BUTTONCANCEL">
                {{mg.getValue(mgc.BUTTONCANCEL)}}
            </button>
        </div>
    </div>
</div>
