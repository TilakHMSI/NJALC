<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.REPAIR_IN_ENTRY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            PGM=RepairIN
                        </label></h3>
                         <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.Edit4" [magic]="mgc.Edit4" mgFormat />
                           <div class="d-flex align-items-center">
                        <label [magic]="mgc.Edit2" class="mb-0 mr-3">
                            {{mg.getValue(mgc.Edit2)
                            | magicDate : mgc.Edit2}}
                        </label>
                        <label [magic]="mgc.Edit3" class="mb-0 mr-1">
                            {{mg.getValue(mgc.Edit3)
                            | magicTime : mgc.Edit3}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
           
                </div>
            </div>
 <div class="col-lg-12">
            <magic-subform [magic]="mgc.Sub1">
            </magic-subform>
        </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        <div class="form-group row">

                            <div class="col-lg-6">
                                <div class="form-group">
                                    <label>FRAME FROM NO.</label>
                                    <input type='number' [formControlName]="mgc.V_Frame"
                                        [magic]="mgc.V_Frame" class="form-control" mgFormat />

                                </div>
                            </div>
                             <div class="col-lg-6">
                                   <div class="form-group">
                              <button style="margin-top:5.5%" type="button" [magic]="mgc.b_Submit"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                            SUBMIT
                                            </button>
                                            </div>
                            </div>
                             <div class="col-lg-4">
                               
                            </div>
                        

                        </div>
                    </div>

                </div>
            </div>
        </div>
       
    </div>
</div>
