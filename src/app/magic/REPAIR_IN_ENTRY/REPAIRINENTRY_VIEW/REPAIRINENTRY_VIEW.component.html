<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.REPAIRINENTRY_VIEW">
               
 
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear

                     <ng-container [magic]="mgc.Column2" [matColumnDef]="mgc.Column2">
                        <mat-header-cell *matHeaderCellDef>
                            FRAME NUMBER
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.FRAMENUMBER" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.FRAMENUMBER" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.FRAMENUMBER, row.rowId)" mgFormat />
                                        <mgError [magic]=mgc.FRAMENUMBER [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.FRAMENUMBER"
                                            [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.FRAMENUMBER, row.rowId)">
                                            {{mg.getValue(mgc.FRAMENUMBER, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                              <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                           MODEL CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">

                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">

                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>

                        </mat-header-cell>

                                    <label class=" font-size-h4" *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.REPAIRINTIME"

                                        [style.visibility]="mg.getVisible(mgc.REPAIRINTIME, row.rowId)">
                                        {{mg.getValue(mgc.REPAIRINTIME, row.rowId)

                                    </label>

                    </ng-container>
