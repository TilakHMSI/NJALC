<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.DispatchUnlockWithRepairIn"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
                PGM=DispatchUnlockBatch
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label4"
                class="lable_overflow"
            >
            </label>
            <label [magic]="mgc.Edit2">
                {{mg.getValue(mgc.Edit2)
| magicDate : mgc.Edit2}}
            </label>
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicTime : mgc.Edit3}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label5"
                class="lable_overflow"
            >
                Status
            </label>
            <div>
                <select
                    [magic]="mgc.v_FilterOption"
                    [formControlName]="mgc.v_FilterOption"
                >
                    <option
                        *ngFor="let o of mg.getItemListValues(mgc.v_FilterOption);"
                        [selected]="o.index == mg.getValue(mgc.v_FilterOption)"
                        [value]="o.index"
                    >
                        {{o.displayValue}}
                    </option>
                </select>
            </div>
            <label [magic]="mgc.Edit6">
                {{mg.getValue(mgc.Edit6) }}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.b_ApplyFilter">
                10
            </button>
            <label
                [magic]="mgc.Label7"
                class="lable_overflow"
            >
                Text
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                End Date
            </label>
            <input
                type="date"
                [formControlName]="mgc.v_FilterEndDate"
                [magic]="mgc.v_FilterEndDate"
                dateInput
            />
            <input
                type="date"
                [formControlName]="mgc.v_FilterEndFromDate_0001"
                [magic]="mgc.v_FilterEndFromDate_0001"
                dateInput
            />
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.DispatchReleaseBatch_VIEW">
            </magic-subform>
        </div>
        <div style="display: flex; flex-direction: row">
            <div
                [magic]="mgc.Group14"
                class="container_border"
                style="display: flex; flex-direction: column"
            >
                <div style="display: flex; flex-direction: row">
                    <label
                        [magic]="mgc.Label15"
                        class="lable_overflow"
                    >
                        Start Date
                    </label>
                    <input
                        type="date"
                        [formControlName]="mgc.v_BatchStartDate_0001"
                        [magic]="mgc.v_BatchStartDate_0001"
                        dateInput
                    />
                    <input
                        type="time"
                        [formControlName]="mgc.v_BatchStartTime_0001"
                        [magic]="mgc.v_BatchStartTime_0001"
                        step=1
                    />
                </div>
                <div style="display: flex; flex-direction: row">
                    <label
                        [magic]="mgc.Label18"
                        class="lable_overflow"
                    >
                        End Date
                    </label>
                    <input
                        type="date"
                        [formControlName]="mgc.v_BatchEndDate_0001"
                        [magic]="mgc.v_BatchEndDate_0001"
                        dateInput
                    />
                    <input
                        type="time"
                        [formControlName]="mgc.v_BatchEndTime_0001"
                        [magic]="mgc.v_BatchEndTime_0001"
                        step=1
                    />
                </div>
            </div>
            <button [magic]="mgc.SaveBatch">
                10
            </button>
        </div>
    </div>
</div>
