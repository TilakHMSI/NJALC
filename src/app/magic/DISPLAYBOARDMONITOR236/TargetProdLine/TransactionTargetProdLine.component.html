<div class="d-flex justify-content-center align-items-center"  novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.TransactionTargetProdLine">
        <div class="message-box text-center p-3  w-100">
            <div class="message-title mb-2">Message</div>

            <div class="d-flex justify-content-center align-items-center mb-4">
                <span class="engine-label me-2">TARGET -</span>
                <span class="engine-no text-primary">{{mg.getValue(mgc.V_VTarget) }}</span>
            </div>
            <div class="d-flex justify-content-center align-items-center mb-4">
                <span class="engine-label mr-5">PLAN -</span>
                <span class="engine-no text-primary">{{mg.getValue(mgc.V_VPlan) }}</span>
            </div>
            <div class="d-flex justify-content-center align-items-center mb-4">
                <span class="engine-label mr-5">ACTUAL -</span>
                <span class="engine-no text-primary">{{mg.getValue(mgc.V_VActual) }}</span>
            </div>

            <div class="status-box mx-auto py-2 px-3 w-100">
                <label class="lbl_Status" class="lable_overflow">
                    {{mg.getValue(mgc.V_VMessage) }}
                </label>
            </div>
        </div>
        <button type="button" [magic]="mgc.btnexit" class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
    </div>
</div>
