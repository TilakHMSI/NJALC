<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.DispatchStopReport">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                          PGM=DispatchStopReport
                        </label></h3>
                  
                    <div class="d-flex align-items-center">
                          <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.Edit4" [magic]="mgc.Edit4" mgFormat />
                      
    <div class="d-flex align-items-center">
                        <label [magic]="mgc.Edit2" class="mb-0 mr-3">
                            {{mg.getValue(mgc.Edit2)
                            | magicDate : mgc.Edit2}}
                        </label>
                        <label [magic]="mgc.Edit3" class="mb-0 mr-1">
                            {{mg.getValue(mgc.Edit3)
                            | magicTime : mgc.Edit3}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
   
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                          
                <div class="col-lg-4">
                                <label class="lbl-sm">SELECT</label>
                                  <select class="form-control-ed" [magic]="mgc.v_FilterOption"
                                    [formControlName]="mgc.v_FilterOption">
                                    <option *ngFor="let o of mg.getItemListValues(mgc.v_FilterOption);"
                                        [selected]="o.index == mg.getValue(mgc.v_FilterOption)" [value]="o.index">
                                        {{o.displayValue}}
                                    </option>
                                </select>
                            </div>
                               <div class="col-lg-4">
                                <label class="lbl-sm"></label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.v_FilterEndDate"
                            [magic]="mgc.v_FilterEndDate" dateInput />
                            </div>
                               <div class="col-lg-4">
                                <label class="lbl-sm"></label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.v_FilterEndFromDate_0001"
                            [magic]="mgc.v_FilterEndFromDate_0001" dateInput />
                            </div>
                           
                          
                      
    </div>


                 <div class="form-group">
        <label style="margin-top: 3%;">OUTPUT OPTION</label>
        <div [magic]="mgc.v_OutputOption"
             (change)="task.mgOnRadioSelectionChanged(mgc.v_OutputOption)">

            <div style="display: inline-block; margin-right: 15px;"
                 *ngFor="let o of mg.getItemListValues(mgc.v_OutputOption);">
                <label>
                    <input type="radio"
                           [formControlName]="mgc.v_OutputOption"
                           [value]="o.index" />
                    {{o.displayValue}}
                </label>
            </div>

        </div>
    </div>


                                                
<div class="row">
      <div class="col-lg-4 " ></div>
   <div class="col-lg-4 text-center" >

                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.b_ApplyFilter"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                               Generate
                                            </button>
                                           

                                        </div>
                                       
                                    </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
