<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.VEHICLEAFOFF175">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                       VEHICLE AF OFF 
                        </label></h3>
                  
                    <div class="d-flex align-items-center">
                     
                    
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                          

         <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date From</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.v_DateFrom"
                            [magic]="mgc.v_DateFrom" dateInput />

                                </div>
                            </div>

                             <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date To</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.v_DateTo"
                            [magic]="mgc.v_DateTo" dateInput />

                                </div>
                            </div>

                              <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label class="lbl-sm">Prod Line</label>
                        <select class="form-control-ed" [magic]="mgc.v_Prod_Line" [formControlName]="mgc.v_Prod_Line">
                            <option *ngFor="let o of mg.getItemListValues(mgc.v_Prod_Line);"
                                [selected]="o.index == mg.getValue(mgc.v_Prod_Line)" [value]="o.index">
                                {{o.displayValue}}
                            </option>
                        </select>
                    </div>
                </div>
 <div class="col-lg-6">
                                 <div class="form-group">
<label class="lbl-sm">Click to select model</label>
                   <button type="button" [magic]="mgc.v_ModeList"
                                             [disabled]="mg.isDisabled(mgc.v_ModeList )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                Model List
                                            </button>
                                            </div>
                                            </div>

                 <div class="form-group">
        <label>Generate</label>
        <div [magic]="mgc.v_GenXLorRep"
             (change)="task.mgOnRadioSelectionChanged(mgc.v_GenXLorRep)">

            <div style="display: inline-block; margin-right: 15px;"
                 *ngFor="let o of mg.getItemListValues(mgc.v_GenXLorRep);">
                <label>
                    <input type="radio"
                           [formControlName]="mgc.v_GenXLorRep"
                           [value]="o.index" />
                    {{o.displayValue}}
                </label>
            </div>

        </div>
    </div>
   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.v_Generate"
                                             [disabled]="mg.isDisabled(mgc.v_Generate )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                Generate Report
                                            </button>
                                            <button type="button" [magic]="mgc.CancelCtl"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                          Cancel
                                            </button>

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
