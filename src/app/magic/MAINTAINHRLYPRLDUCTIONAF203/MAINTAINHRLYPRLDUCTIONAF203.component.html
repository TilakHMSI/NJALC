<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.MAINTAINHRLYPRLDUCTIONAF203">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lbl-sm" class="lable_overflow mb-0">
                            {{mg.getText(mgc.Label1)}}
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label class="lbl-sm">SHIFT:</label>
                                <select class="form-control" [magic]="mgc.V_SHIFT" [formControlName]="mgc.V_SHIFT">
                                    <option *ngFor="let o of mg.getItemListValues(mgc.V_SHIFT);"
                                        [selected]="o.index == mg.getValue(mgc.V_SHIFT)" [value]="o.index">
                                        {{o.displayValue}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label class="lbl-sm">PRODUCTION LINE: </label>
                                <select class="form-control" [magic]="mgc.V_PRD_LINE" [formControlName]="mgc.V_PRD_LINE">
                                    <option *ngFor="let o of mg.getItemListValues(mgc.V_PRD_LINE);"
                                        [selected]="o.index == mg.getValue(mgc.V_PRD_LINE)" [value]="o.index">
                                        {{o.displayValue}}
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.Sub1">
                </magic-subform>
            </div>
        </div>
    </div>
</div>
