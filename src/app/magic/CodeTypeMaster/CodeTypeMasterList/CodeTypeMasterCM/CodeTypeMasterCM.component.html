<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.CodeTypeMasterCM">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            Code Type Master : CM
                        </label></h3>

                    <div class="d-flex align-items-center">

                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">FLAG</label>
                                    <input [formControlName]="mgc.V_FLAG" [magic]="mgc.V_FLAG" class="form-control-ed"
                                        mgFormat />
                                    <mgError [magic]="mgc.V_FLAG"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">CODE</label>
                                    <input [formControlName]="mgc.V_CODE" [magic]="mgc.V_CODE" class="form-control-ed"
                                        mgFormat />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">SUBCODE </label>
                                    <input [formControlName]="mgc.V_SUBCODE" [magic]="mgc.V_SUBCODE"
                                        class="form-control-ed" mgFormat />
                                    <mgError [magic]="mgc.V_SUBCODE"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">DESCRIPTION</label>
                                    <input [formControlName]="mgc.V_DESCRIPTION" [magic]="mgc.V_DESCRIPTION"
                                        class="form-control-ed" mgFormat />
                                    <mgError [magic]="mgc.V_DESCRIPTION"> </mgError>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.B_SAVE"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
