<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.AFOFFRESULTENTRY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Label4)}}
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-2 mt-2">
                            <div class="form-group">
                                <div [magic]="mgc.MODE_V" *ngIf="mg.getVisible(mgc.MODE_V)==='visible'"
                                    (change)="task.mgOnRadioSelectionChanged(mgc.MODE_V)">
                                    <div *ngFor="let o of mg.getItemListValues(mgc.MODE_V);">
                                        <label>
                                            <input type="radio" [formControlName]="mgc.MODE_V" [value]="o.index" />
                                            {{o.displayValue}}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-3" *ngIf="mg.getVisible(mgc.UN_CHASSIS_NO_V)==='visible'">
                            <div class="form-group">
                                <label>FRAME NO</label>
                                <input class="form-control" [formControlName]="mgc.UN_CHASSIS_NO_V"
                                    [magic]="mgc.UN_CHASSIS_NO_V"
                                    [style.visibility]="mg.getVisible(mgc.UN_CHASSIS_NO_V)" mgFormat />
                            </div>
                        </div>
                        <div class="col-lg-3" *ngIf="mg.getVisible(mgc.RE_CHASSIS_NO_V)==='visible'">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.RE_CHASSIS_NO_V)==='visible'">
                                <label>FRAME NO</label>
                                <div class="input-group">
                                    <input type="text" [formControlName]="mgc.RE_CHASSIS_NO_V"
                                        [magic]="mgc.RE_CHASSIS_NO_V" class="form-control" placeholder="SELECT FRAME NO"
                                        mgFormat />
                                    <div class="input-group-append">
                                        <button type="button" class="btn btn-loanlist btn-icon"
                                            [magic]="mgc.RE_CHASSIS_NO_V">
                                            <span class="svg-icon svg-icon-lg"><svg xmlns="http://www.w3.org/2000/svg"
                                                    xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                    height="24px" viewBox="0 0 24 24" version="1.1">
                                                    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                                                        <rect x="0" y="0" width="24" height="24" />
                                                        <path
                                                            d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                            fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                        <path
                                                            d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                            fill="#000000" opacity="0.3" />
                                                    </g>
                                                </svg></span></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-3" *ngIf="mg.getVisible(mgc.ENGINE_NO_V)==='visible'">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.ENGINE_NO_V)==='visible'">
                                <label>ENGINE NO</label>
                                <div class="input-group">
                                    <input type="text" [formControlName]="mgc.ENGINE_NO_V" [magic]="mgc.ENGINE_NO_V"
                                        class="form-control" placeholder="SELECT ENGINE NO" mgFormat />
                                    <div class="input-group-append">
                                        <button type="button" class="btn btn-loanlist btn-icon"
                                            [magic]="mgc.ENGINE_NO_V">
                                            <span class="svg-icon svg-icon-lg"><svg xmlns="http://www.w3.org/2000/svg"
                                                    xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                    height="24px" viewBox="0 0 24 24" version="1.1">
                                                    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                                                        <rect x="0" y="0" width="24" height="24" />
                                                        <path
                                                            d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                            fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                        <path
                                                            d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                            fill="#000000" opacity="0.3" />
                                                    </g>
                                                </svg></span></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">

                        </div>

                    </div>
                    <div class="form-group row">
                        <div class="col-lg-2">
                            <div class="form-group-sm">
                                <label class="lbl-sm">FRAME NUMBER</label>
                                <input [formControlName]="mgc.V_DISP_FRAME_NO" [magic]="mgc.V_DISP_FRAME_NO"
                                    class="form-control-sm" mgFormat />
                                <mgError [magic]="mgc.V_DISP_FRAME_NO"> </mgError>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group-sm">
                                <label class="lbl-sm">ENGINE NO</label>
                                <input [formControlName]="mgc.Edit20" [magic]="mgc.Edit20" class="form-control-sm"
                                    mgFormat />
                                <mgError [magic]="mgc.Edit20"> </mgError>
                            </div>
                        </div>
                        <div class="col-lg-1">
                            <div class="form-group-sm">
                                <label class="lbl-sm" style="width: 100%;">.</label>
                                <input [formControlName]="mgc.Edit21" [magic]="mgc.Edit21" class="form-control-sm"
                                    mgFormat />
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group-sm">
                                <label class="lbl-sm" style="width: 100%;">AF-OFF DATE - TIME</label>
                                <label class="text-danger font-size-h4 mr-8" style="background-color: #ebedf3;">
                                    {{mg.getValue(mgc.Edit22)
                                    | magicDate : mgc.Edit22}}</label>
                                <label class="text-danger font-size-h4" style="background-color: #ebedf3;">
                                    {{mg.getValue(mgc.Edit23)
                                    | magicTime : mgc.Edit23}}</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.Sub1">
                </magic-subform>
            </div>
        </div>
    </div>
</div>
