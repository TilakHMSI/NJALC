<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.DPRStatusReport">
        <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <h3><label class="lable_overflow mb-0">
                                     DPR STAUS REPORT
                                </label></h3>
                            <label></label>

                    
                            <div class="d-flex">
                              
 <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                      
                            <div class="col-lg-12 col-xxl-12">
                                <div class="form-group row">
                               
                                    
                                      <div class="col-lg-10">
                                       <div class="form-group-sm">
                        <label class="lbl-sm">DATE</label>
                        <input class="form-control-ed" type="date" [formControlName]="mgc.v_Date"
                            [magic]="mgc.v_Date" dateInput />
                           
                    </div>
                                     

                                    </div>

                                      <div class="col-lg-10">
                                       <div class="form-group-sm">
                        <label class="lbl-sm">SHIFT:</label>
                        <select class="form-control-ed" [magic]="mgc.v_Shift" [formControlName]="mgc.v_Shift">
                            <option *ngFor="let o of mg.getItemListValues(mgc.v_Shift);"
                                [selected]="o.index == mg.getValue(mgc.v_Shift)" [value]="o.index">
                                {{o.displayValue}}
                            </option>
                        </select>
                    </div>
                                     

                                    </div>


                                    <div class="col-lg-12 text-center">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.v_Exec"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.v_Exit"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                              EXIT
                                            </button>

                                        </div>
                                    </div>



                                </div>

                         
                        
                    </div>
                </div>
            </div>
        </div>
        </div>
