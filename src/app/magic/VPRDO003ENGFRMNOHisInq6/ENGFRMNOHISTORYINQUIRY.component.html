<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.ENGFRMNOHISTORYINQUIRY"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                ENG/FRM TYPE
            </label>
            <div>
                <input
                    style="width: 70%"
                    [formControlName]="mgc.ENGFRMTYPE_V"
                    [magic]="mgc.ENGFRMTYPE_V"
                    mgFormat
                />
                <mgError [magic]=mgc.ENGFRMTYPE_V> </mgError>
                <button
                    style="min-width: auto; margin: auto"
                    [magic]="mgc.ENGFRMTYPE_V"
                >...</button>
            </div>
            <label
                [magic]="mgc.Label9"
                class="lable_overflow"
            >
                ENG/FRM NO.
            </label>
            <div>
                <input
                    [formControlName]="mgc.CHASSIS_NO_V"
                    type='number'
                    [magic]="mgc.CHASSIS_NO_V"
                    mgFormat
                />
                <mgError [magic]=mgc.CHASSIS_NO_V> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.V_LOCATE_P"
                    [magic]="mgc.V_LOCATE_P"
                    mgFormat
                />
                <mgError [magic]=mgc.V_LOCATE_P> </mgError>
            </div>
            <label
                [magic]="mgc.Label5"
                class="lable_overflow"
            >
                PGM=VPRDO003
            </label>
            <label [magic]="mgc.Edit6">
                {{mg.getValue(mgc.Edit6)
| magicDate : mgc.Edit6}}
            </label>
            <label [magic]="mgc.Edit7">
                {{mg.getValue(mgc.Edit7)
| magicTime : mgc.Edit7}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.Sub1">
            </magic-subform>
        </div>
    </div>
</div>
