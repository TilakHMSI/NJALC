<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.AEOFFAFOFFRESULTINQUIRY"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label3"
                class="lable_overflow"
            >
            </label>
            <div
                [magic]="mgc.SELECT_V"
                (change)="task.mgOnRadioSelectionChanged(mgc.SELECT_V)"
            >
                <div *ngFor="let o of mg.getItemListValues(mgc.SELECT_V);">
                    <label>
                        <input
                            type="radio"
                            [formControlName]="mgc.SELECT_V"
                            [value]="o.index"
                        />
                        {{o.displayValue}}
                    </label>
                </div>
            </div>
            <div>
                <input
                    [formControlName]="mgc.V_LOCATE_P"
                    [magic]="mgc.V_LOCATE_P"
                    mgFormat
                />
                <mgError [magic]=mgc.V_LOCATE_P> </mgError>
            </div>
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                PGM=VPRDO035
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <input
                type="date"
                [formControlName]="mgc.YYYYMMDD_V"
                [magic]="mgc.YYYYMMDD_V"
                dateInput
            />
            <label [magic]="mgc.Edit5">
                {{mg.getValue(mgc.Edit5)
| magicDate : mgc.Edit5}}
            </label>
            <label [magic]="mgc.Edit6">
                {{mg.getValue(mgc.Edit6)
| magicTime : mgc.Edit6}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <input
                type="date"
                [formControlName]="mgc.YYYYMM_V"
                [magic]="mgc.YYYYMM_V"
                dateInput
            />
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                EFM
            </label>
            <div>
                <select
                    [magic]="mgc.EFM_V"
                    [formControlName]="mgc.EFM_V"
                >
                    <option
                        *ngFor="let o of mg.getItemListValues(mgc.EFM_V);"
                        [selected]="o.index == mg.getValue(mgc.EFM_V)"
                        [value]="o.index"
                    >
                        {{o.displayValue}}
                    </option>
                </select>
            </div>
            <label
                [magic]="mgc.Label9"
                class="lable_overflow"
            >
                PROD.LINE
            </label>
            <div>
                <input
                    [formControlName]="mgc.PRODLINE_V"
                    [magic]="mgc.PRODLINE_V"
                    mgFormat
                />
                <mgError [magic]=mgc.PRODLINE_V> </mgError>
            </div>
            <button [magic]="mgc.btnexit">
                Back
            </button>
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.AEOFFAFOFF_RESULT_INQUIRY">
            </magic-subform>
        </div>
    </div>
</div>
