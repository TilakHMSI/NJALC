<div novalidate [formGroup]="screenFormGroup">
    <div  [magic]="mgc.BrowseDEFECTMASTER">
        <div
            class="container-fluid d-flex align-items-center justify-content-sm-between justify-content-center flex-wrap flex-sm-nowrap">
            <div class="d-flex align-items-center flex-wrap mr-1">
                <div class="d-flex align-items-center ser-bt1">
                    <button type="button" class="btn btn-sm btn-success mb-2 mr-4" [magic]="mgc.BtnAdd"
                        *ngIf="mg.getVisible(mgc.BtnAdd)==='visible'">
                        <i class="flaticon-app mr-2"></i>Add
                    </button>
                </div>
            </div>
        </div>
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column2" [matColumnDef]="mgc.Column2">
                        <mat-header-cell *matHeaderCellDef>
                            MODEL CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label [magic]="mgc.DEFECTMASTER_MODELCODE" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.DEFECTMASTER_MODELCODE, row.rowId)
                                        }}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECT CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <input [formControlName]="mgc.DEFECTCODE" style="width: 100%;"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCODE"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTCODE [rowId]="row.rowId"> </mgError>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCODE" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.DEFECTCODE, row.rowId)
                                        }}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECT DESCRIPTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.DEFECTDESCRIPTION"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTDESCRIPTION"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTDESCRIPTION [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTDESCRIPTION"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTDESCRIPTION, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECT CATEGORY
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <div class="input-group" *ngIf="mg.isRowInRowEditing(row)">
                                            <input type="text" [formControlName]="mgc.DEFECTCATEGORY"
                                                *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCATEGORY"
                                                [rowId]="row.rowId" class="form-control-sm"
                                                placeholder="SELECT STAMPING HEAD" mgFormat />
                                            <div class="input-group-append">
                                                <button type="button" class="btn btn-loanlist btn-icon-sm"
                                                    [magic]="mgc.DEFECTCATEGORY" [rowId]="row.rowId">
                                                    <span class="svg-icon svg-icon-lg"><svg
                                                            xmlns="http://www.w3.org/2000/svg"
                                                            xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                            height="24px" viewBox="0 0 24 24" version="1.1">
                                                            <g stroke="none" stroke-width="1" fill="none"
                                                                fill-rule="evenodd">
                                                                <rect x="0" y="0" width="24" height="24" />
                                                                <path
                                                                    d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                    fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                                <path
                                                                    d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                    fill="#000000" opacity="0.3" />
                                                            </g>
                                                        </svg></span></button>
                                            </div>
                                             <mgError [magic]=mgc.DEFECTCATEGORY [rowId]="row.rowId"> </mgError>
                                        </div>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCATEGORY"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTCATEGORY, row.rowId)
                                            }}
                                        </label>
                                        
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECT SECTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <div class="input-group" *ngIf="mg.isRowInRowEditing(row)">
                                            <input type="text" [formControlName]="mgc.DEFECTSECTION"
                                                *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTSECTION"
                                                [rowId]="row.rowId" class="form-control-sm"
                                                placeholder="SELECT STAMPING HEAD" mgFormat />
                                            <div class="input-group-append">
                                                <button type="button" class="btn btn-loanlist btn-icon-sm"
                                                    [magic]="mgc.DEFECTSECTION" [rowId]="row.rowId">
                                                    <span class="svg-icon svg-icon-lg"><svg
                                                            xmlns="http://www.w3.org/2000/svg"
                                                            xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                            height="24px" viewBox="0 0 24 24" version="1.1">
                                                            <g stroke="none" stroke-width="1" fill="none"
                                                                fill-rule="evenodd">
                                                                <rect x="0" y="0" width="24" height="24" />
                                                                <path
                                                                    d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                    fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                                <path
                                                                    d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                    fill="#000000" opacity="0.3" />
                                                            </g>
                                                        </svg></span></button>
                                            </div>
                                        </div>
                                        <mgError [magic]=mgc.DEFECTSECTION [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTSECTION"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTSECTION, row.rowId)
                                            }}
                                        </label>
                                        
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column12" [matColumnDef]="mgc.Column12">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.EnterRowEditing"
                                    [style.visibility]="mg.getVisible(mgc.EnterRowEditing, row.rowId)"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl far fa-edit text-info" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.SaveRowEditing"
                                    [style.visibility]="mg.getVisible(mgc.SaveRowEditing, row.rowId)"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl far fa-save text-success" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.CancelRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl fas fa-eraser text-danger" aria-hidden="true"></i>
                                </button>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
