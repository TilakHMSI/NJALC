<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.FACTORYSTOCKLISTISSUE">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
             FACTORY STOCK LIST ISSUE
                        </label></h3>
                           
                                  <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.V_LOCATE_P" [magic]="mgc.V_LOCATE_P" mgFormat />
           
               
      
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
               PGM=VPRDB023
            </label>
                  
                    <div class="d-flex align-items-center">
                           <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicDate : mgc.Edit3}}
            </label>
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4)
| magicTime : mgc.Edit4}}
            </label>
        </div>
                   
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">

                              <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label class="lbl-sm"> LINE</label>
                        <select class="form-control-ed" [magic]="mgc.v_plant" [formControlName]="mgc.v_plant">
                            <option *ngFor="let o of mg.getItemListValues(mgc.v_plant);"
                            
                                [selected]="o.index == mg.getValue(mgc.v_plant)" [value]="o.index">
                                {{o.displayValue}}
                            </option>
                        </select>
                    </div>
                </div>

                                                <div class="col-lg-6">
                    <div class="form-group-sm">
        <label></label>
        <div [magic]="mgc.SELECT_V" [style.visibility]="mg.getVisible(mgc.SELECT_V)"
             (change)="task.mgOnRadioSelectionChanged(mgc.SELECT_V)">

            <div style="display: inline-block; margin-right: 15px;"
                 *ngFor="let o of mg.getItemListValues(mgc.SELECT_V);">
                <label>
                    <input type="radio"
                           [formControlName]="mgc.SELECT_V"
                           [value]="o.index" />
                    {{o.displayValue}}
                </label>
            </div>

        </div>
    </div>
    </div>
          <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label [style.visibility]="mg.getVisible(mgc.DAY_V)" class="lbl-sm">DAYS PASS</label>
                        <input [formControlName]="mgc.DAY_V" [magic]="mgc.DAY_V" class="form-control-ed" [style.visibility]="mg.getVisible(mgc.DAY_V)"
                            mgFormat />
                        <mgError [magic]="mgc.DAY_V"> </mgError>
                    </div>
                </div>
   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.EXECBUTTON"
                                             [disabled]="mg.isDisabled(mgc.EXECBUTTON )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                           EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.CANCELBUTTON"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                       CANCEL
                                            </button>

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
