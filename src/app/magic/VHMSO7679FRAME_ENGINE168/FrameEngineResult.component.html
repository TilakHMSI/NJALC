<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.FrameEngineResult">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                          Frame Engine Result
                        </label></h3>
                  
                    <div class="d-flex align-items-center">
                        <label  class="mb-0 mr-3">
                            VHMSO7679
                        </label>
                    
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                        
     <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date From</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.DATE_V_FROM"
                            [magic]="mgc.DATE_V_FROM" dateInput />

                                </div>
                            </div>

                             <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date To</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.DATE_V_TO"
                            [magic]="mgc.DATE_V_TO" dateInput />

                                </div>
                            </div>
   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.OK_V"
                                             [disabled]="mg.isDisabled(mgc.OK_V )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                OK
                                            </button>
                                            <button type="button" [magic]="mgc.CancelCtl"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                          Cancel
                                            </button>

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
