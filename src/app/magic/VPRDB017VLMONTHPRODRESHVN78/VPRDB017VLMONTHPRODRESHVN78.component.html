<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.VPRDB017VLMONTHPRODRESHVN78">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                MONTH PROd CRESHVN
                        </label></h3>
                           
                                  <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.V_LOCATE" [magic]="mgc.V_LOCATE" mgFormat />
           
               
      
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                PGM=VPRDB015
            </label>
                  
                    <div class="d-flex align-items-center">
                           <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicDate : mgc.Edit3}}
            </label>
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4)
| magicTime : mgc.Edit4}}
            </label>
        </div>
                   
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">

     <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.DATE_V"
                            [magic]="mgc.DATE_V" dateInput />

                                </div>
                            </div>
    

   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.EXEC_BUTTON"
                                             [disabled]="mg.isDisabled(mgc.EXEC_BUTTON )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                           EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.CANCEL_BUTTON"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                       CANCEL
                                            </button>

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
