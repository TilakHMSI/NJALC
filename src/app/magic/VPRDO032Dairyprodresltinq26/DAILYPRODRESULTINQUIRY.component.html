<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.DAILYPRODRESULTINQUIRY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lbl-sm" class="lable_overflow mb-0">
                            ENGINE FRAME NO DETAIL INQUIRY
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-2">
                            <div [magic]="mgc.SELECT_V" *ngIf="mg.getVisible(mgc.SELECT_V)==='visible'"
                                (change)="task.mgOnRadioSelectionChanged(mgc.SELECT_V)">
                                <div *ngFor="let o of mg.getItemListValues(mgc.SELECT_V);">
                                    <label>
                                        <input type="radio" [formControlName]="mgc.SELECT_V" [value]="o.index" />
                                        {{o.displayValue}}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.YYYYMMDD_V)==='visible'">
                                <label>DD-MM-YYYY</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.YYYYMMDD_V"
                                    [magic]="mgc.YYYYMMDD_V" dateInput />
                            </div>
                            <div class="form-group" *ngIf="mg.getVisible(mgc.YYYYMM_V)==='visible'">
                                <label>MM-YYYY</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.YYYYMM_V"
                                    [magic]="mgc.YYYYMM_V" dateInput />
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>EFM</label>
                                <select class="form-control-ed" [magic]="mgc.EFM_V" [formControlName]="mgc.EFM_V">
                                    <option *ngFor="let o of mg.getItemListValues(mgc.EFM_V);"
                                        [selected]="o.index == mg.getValue(mgc.EFM_V)" [value]="o.index">
                                        {{o.displayValue}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group">
                                <label>PROD LINE</label>
                                <input class="form-control-ed" [formControlName]="mgc.PRODLINE_V" type='number'
                                    [magic]="mgc.PRODLINE_V" mgFormat />
                                <mgError [magic]=mgc.PRODLINE_V> </mgError>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.DAILY_PRODRESULT_INQUIRY">
                </magic-subform>
            </div>
            <div class="col-lg-12">
                <div class="form-group row">
                    <div class="col-lg-2 border-yellow rounded p-2">
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_LAST_PROG">
                            {{mg.getValue(mgc.V_CNT_LAST_PROG)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_PLAN">
                            {{mg.getValue(mgc.V_CNT_PLAN)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_AF_OFF">
                            {{mg.getValue(mgc.V_CNT_AF_OFF)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_PROG">
                            {{mg.getValue(mgc.V_CNT_PROG)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_PROG">
                            {{mg.getValue(mgc.V_TOTAL_PROG)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_WE_OFF">
                            {{mg.getValue(mgc.V_CNT_WE_OFF)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_VQ_OFF">
                            {{mg.getValue(mgc.V_CNT_VQ_OFF)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_PACK">
                            {{mg.getValue(mgc.V_CNT_PACK)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_SHIP">
                            {{mg.getValue(mgc.V_CNT_SHIP)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_RETURN">
                            {{mg.getValue(mgc.V_CNT_RETURN)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_RESHIP">
                            {{mg.getValue(mgc.V_CNT_RESHIP)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_CNT_EX_OUT">
                            {{mg.getValue(mgc.V_CNT_EX_OUT)}}
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
