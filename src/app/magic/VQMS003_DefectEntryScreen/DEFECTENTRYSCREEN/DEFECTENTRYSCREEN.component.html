<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.DEFECTENTRYSCREEN">

        <div class="col-lg-12">
            <div class="form-group row">
                <hr class="border-danger w-100">
            </div>
            <div class="form-group row">
                <div class="col-lg-3" *ngIf="mg.getVisible(mgc.vDEFECTCODE)==='visible'">
                    <div class="form-group">
                        <label>SELECT DEFECT CODE</label>
                        <div class="input-group">
                            <input type="text" [formControlName]="mgc.vDEFECTCODE" [magic]="mgc.vDEFECTCODE"
                                class="form-control" placeholder="SELECT DEFECT CODE" mgFormat />
                            <div class="input-group-append">
                                <button type="button" class="btn btn-loanlist btn-icon" [magic]="mgc.btnDefectCode">
                                    <span class="svg-icon svg-icon-lg"><svg xmlns="http://www.w3.org/2000/svg"
                                            xmlns:xlink="http://www.w3.org/1999/xlink" width="24px" height="24px"
                                            viewBox="0 0 24 24" version="1.1">
                                            <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                                                <rect x="0" y="0" width="24" height="24" />
                                                <path
                                                    d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                    fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                <path
                                                    d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                    fill="#000000" opacity="0.3" />
                                            </g>
                                        </svg></span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table2TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column22" [matColumnDef]="mgc.Column22">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECTCODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.DEFECTCODE" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.DEFECTCODE" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTCODE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCODE"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTCODE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECT DESCRIPTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.DEFECTDESCRIPTION"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTDESCRIPTION"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTDESCRIPTION [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTDESCRIPTION"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTDESCRIPTION, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column24" [matColumnDef]="mgc.Column24">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECTCATEGORY
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.DEFECTCATEGORY" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.DEFECTCATEGORY" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTCATEGORY [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTCATEGORY"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTCATEGORY, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column26" [matColumnDef]="mgc.Column26">
                        <mat-header-cell *matHeaderCellDef>
                            DEFECTSECTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.DEFECTSECTION" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.DEFECTSECTION" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.DEFECTSECTION [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DEFECTSECTION"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.DEFECTSECTION, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column28" [matColumnDef]="mgc.Column28">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl btn-danger" [magic]="mgc.btnDelete" [rowId]="row.rowId">
                                    Delete
                                </button>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
