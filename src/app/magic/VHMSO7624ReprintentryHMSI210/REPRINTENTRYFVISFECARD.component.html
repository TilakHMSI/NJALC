<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.REPRINTENTRYFVISFECARD">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Label9)}}
                        </label></h3>

                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        <div class="form-group row">
                            <div class="col-lg-2 mt-5">
                                <div [magic]="mgc.MODE_V" *ngIf="mg.getVisible(mgc.MODE_V)==='visible'"
                                    (change)="task.mgOnRadioSelectionChanged(mgc.MODE_V)">
                                    <div *ngFor="let o of mg.getItemListValues(mgc.MODE_V);">
                                        <label>
                                            <input type="radio" [formControlName]="mgc.MODE_V" [value]="o.index" />
                                            {{o.displayValue}}
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-3" *ngIf="mg.getVisible(mgc.ENGFRMTYPE_V)==='visible'">
                                <div class="form-group">
                                    <label>ENG/FRM TYPE</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.ENGFRMTYPE_V"
                                            [magic]="mgc.ENGFRMTYPE_V" class="form-control"
                                            placeholder="SELECT ENG/FRM TYPE" mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.ENGFRMTYPE_V">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group">
                                    <label>FROM</label>
                                    <input class="form-control" [formControlName]="mgc.CHASSIS_NOFROM_V"
                                        [magic]="mgc.CHASSIS_NOFROM_V" mgFormat />
                                    <mgError [magic]=mgc.CHASSIS_NOFROM_V> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group">
                                    <label>TO</label>
                                    <input class="form-control" [formControlName]="mgc.CHASSIS_NOTO_V"
                                        [magic]="mgc.CHASSIS_NOTO_V" mgFormat />
                                    <mgError [magic]=mgc.CHASSIS_NOTO_V> </mgError>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12">
                        <hr class="alert-danger hr">
                        <magic-subform [magic]="mgc.ConfirmEntry">
                        </magic-subform>
                    </div>

                    <div class="col-lg-12 text-center" style="margin-top: 5%;" *ngIf="mg.getVisible(mgc.PRINT_BOTTON_V)==='visible'">
                        <div class="form-group d-flex justify-content-center">

                            <button type="button" [magic]="mgc.PRINT_BOTTON_V"
                                class="btn btn-primary font-weight-bold mr-3 ">
                                PRINT
                            </button>
                            <button type="button" [magic]="mgc.DEL" class="btn btn-warning font-weight-bold mr-3 ">
                                DEL
                            </button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
