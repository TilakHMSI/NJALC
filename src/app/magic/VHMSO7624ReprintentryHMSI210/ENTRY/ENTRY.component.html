<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.ENTRY"
    >
        <div style="display: flex; flex-direction: row">
            <div class="example-container mat-elevation-z8 Table3TableContainerProps">
                <mat-table
                    #table
                    [dataSource]="dataSource"
                    class="container_border"
                    matSort
                    matSortDisableClear
                    (matSortChange)="tableService.sortData($event)"
                >
                    <ng-container
                        [magic]="mgc.Column4"
                        [matColumnDef]="mgc.Column4"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            ENG/FRM NUMBER
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <label
                                    [magic]="mgc.Label12"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                </label>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_ENG_FRM_TYPE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_ENG_FRM_TYPE, row.rowId)
}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_CHASSIS_NO_FROM"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_CHASSIS_NO_FROM, row.rowId)
}}
                                    </label>
                                </div>
                                <label
                                    [magic]="mgc.Label16"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                    -
                                </label>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_CHASSIS_NO_TO"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_CHASSIS_NO_TO, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <label
                                    [magic]="mgc.Label33"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                </label>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column5"
                        [matColumnDef]="mgc.Column5"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            QTY
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.PLAN_RESULT"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.PLAN_RESULT, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <label
                                    [magic]="mgc.Label34"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                </label>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column6"
                        [matColumnDef]="mgc.Column6"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            EFM
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_EFM"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_EFM, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column7"
                        [matColumnDef]="mgc.Column7"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            MODEL
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <label
                                    [magic]="mgc.Label13"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                </label>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_MTO_NAME"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_MTO_NAME, row.rowId)
}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_MTO_CODE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_MTO_CODE, row.rowId)
}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_COLOR_CODE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_COLOR_CODE, row.rowId)
}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input
                                            [formControlName]="mgc.X3_COLOR_CODE_INSIDE"
                                            *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.X3_COLOR_CODE_INSIDE"
                                            [rowId]="row.rowId"
                                            mgFormat
                                        />
                                        <mgError
                                            [magic]=mgc.X3_COLOR_CODE_INSIDE
                                            [rowId]="row.rowId"
                                        > </mgError>
                                        <label
                                            *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.X3_COLOR_CODE_INSIDE"
                                            [rowId]="row.rowId"
                                        >
                                            {{mg.getValue(mgc.X3_COLOR_CODE_INSIDE, row.rowId)
}}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column8"
                        [matColumnDef]="mgc.Column8"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            VIN
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_VIN_TYPE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_VIN_TYPE, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.X3_FRAME_NO_MARK"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.X3_FRAME_NO_MARK, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column9"
                        [matColumnDef]="mgc.Column9"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            OEM
                            REP
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <label
                                    [magic]="mgc.Label11"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                    REP
                                </label>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.Edit23"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.Edit23, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.Edit28"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.Edit28, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container
                        [magic]="mgc.Column10"
                        [matColumnDef]="mgc.Column10"
                    >
                        <mat-header-cell *matHeaderCellDef>
                            NOTE(INDICATED)
                        </mat-header-cell>
                        <mat-cell
                            *matCellDef="let row"
                            magicMark="magicTableRowContainer"
                        >
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.PLAN_CODE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.PLAN_CODE, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.PLAN_DATE"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.PLAN_DATE, row.rowId)
| magicDate : mgc.PLAN_DATE}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.PLAN_SEQ"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.PLAN_SEQ, row.rowId)
}}
                                    </label>
                                </div>
                                <label
                                    [magic]="mgc.Label31"
                                    [rowId]="row.rowId"
                                    class="lable_overflow"
                                >
                                    -
                                </label>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label
                                        [magic]="mgc.PLAN_SEQ_SUFFIX"
                                        [rowId]="row.rowId"
                                    >
                                        {{mg.getValue(mgc.PLAN_SEQ_SUFFIX, row.rowId)
}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row
                        *matRowDef="let row; columns: displayedColumns;"
                        class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}"
                        [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null"
                    >
                    </mat-row>
                </mat-table>
                <mat-paginator
                    #paginator
                    [pageSize]="10"
                    [pageSizeOptions]="[5, 10, 20]"
                    (page)="tableService.mgOnPaginateChange($event)"
                >
                </mat-paginator>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
                TOTAL
            </label>
            <label [magic]="mgc.V_V_QTYENTRY">
                {{mg.getValue(mgc.V_V_QTYENTRY) }}
            </label>
        </div>
    </div>
</div>
