<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.TransactionTargetProdLine">
        <div
            class="container-fluid d-flex align-items-center justify-content-sm-between justify-content-center flex-wrap flex-sm-nowrap">
            <div class="d-flex align-items-center flex-wrap mr-1">
                <div class="d-flex align-items-center ser-bt1">
                    <!-- <div></div><button type="button" class="btn btn-sm btn-success mb-4" [magic]="mgc.btnAdd"
                        *ngIf="mg.getVisible(mgc.btnAdd)==='visible'">
                        <i class="flaticon-app mr-2"></i>Add
                    </button> -->
                </div>
            </div>
        </div>
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column2" [matColumnDef]="mgc.Column2">
                        <mat-header-cell *matHeaderCellDef>
                            ProdLine
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.TargetProdLine_PRODLIND"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.TargetProdLine_PRODLIND"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.TargetProdLine_PRODLIND [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.TargetProdLine_PRODLIND"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.TargetProdLine_PRODLIND, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                            Shift
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.TargetProdLine_SHIFT"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.TargetProdLine_SHIFT"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.TargetProdLine_SHIFT [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.TargetProdLine_SHIFT"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.TargetProdLine_SHIFT, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            Target
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.TARGET"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number' [magic]="mgc.TARGET"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.TARGET [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.TARGET"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.TARGET, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                            TakTime
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.TAKTIME"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number' [magic]="mgc.TAKTIME"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.TAKTIME [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.TAKTIME"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.TAKTIME, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            Message
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row; width: 100%;" *ngIf="mg.ifRowCreated(row)">
                                <div style="display: flex; flex-direction: row; width: 100%;"  [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <input class="form-control-ed w-100" [formControlName]="mgc.MESSAGE" *ngIf="mg.isRowInRowEditing(row)"
                                        [magic]="mgc.MESSAGE" [rowId]="row.rowId" mgFormat />
                                    <mgError [magic]=mgc.MESSAGE [rowId]="row.rowId"> </mgError>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.MESSAGE" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.MESSAGE, row.rowId)
                                        }}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column15" [matColumnDef]="mgc.Column15">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.EnterRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl far fa-edit text-info" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.SaveRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl far fa-save text-success" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.CancelRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl fas fa-eraser text-danger" aria-hidden="true"></i>
                                </button>
                            </div>

                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
