<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.SHIPPINGRESULTINQUIRY">
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table4TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                            DATE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="date" [formControlName]="mgc.PRDO036_WORK_W3_DATE"
                                            [magic]="mgc.PRDO036_WORK_W3_DATE" [rowId]="row.rowId" dateInput />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_DATE"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.PRDO036_WORK_W3_DATE, row.rowId)
                                        | magicDate : mgc.PRDO036_WORK_W3_DATE}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            EFM
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_EFM"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_EFM"
                                            [rowId]="row.rowId" mgFormat rangevalidator />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_EFM [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_EFM"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_EFM, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column7" [matColumnDef]="mgc.Column7">
                        <mat-header-cell *matHeaderCellDef>
                            MODEL CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_MTO_CODE"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_MTO_CODE"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_MTO_CODE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_MTO_CODE"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_MTO_CODE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column8" [matColumnDef]="mgc.Column8">
                        <mat-header-cell *matHeaderCellDef>
                            COLOR CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_COLOR_CODE"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_COLOR_CODE"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_COLOR_CODE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PRDO036_WORK_W3_COLOR_CODE" [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_COLOR_CODE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.W3_COLOR_CODEINSIDE"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.W3_COLOR_CODEINSIDE"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.W3_COLOR_CODEINSIDE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.W3_COLOR_CODEINSIDE"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.W3_COLOR_CODEINSIDE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column9" [matColumnDef]="mgc.Column9">
                        <mat-header-cell *matHeaderCellDef>
                            ENG/FRM TYPE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_ENGFRMTYPE"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_ENGFRMTYPE"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_ENGFRMTYPE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PRDO036_WORK_W3_ENGFRMTYPE" [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_ENGFRMTYPE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column10" [matColumnDef]="mgc.Column10">
                        <mat-header-cell *matHeaderCellDef>
                            FROM
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_FROM"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.PRDO036_WORK_W3_FROM" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_FROM [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_FROM"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_FROM, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column11" [matColumnDef]="mgc.Column11">
                        <mat-header-cell *matHeaderCellDef>
                            TO
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_TO"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.PRDO036_WORK_W3_TO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_TO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_TO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_TO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column12" [matColumnDef]="mgc.Column12">
                        <mat-header-cell *matHeaderCellDef>
                            RESULT
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_RESULT"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.PRDO036_WORK_W3_RESULT" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_RESULT [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_RESULT"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_RESULT, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column13" [matColumnDef]="mgc.Column13">
                        <mat-header-cell *matHeaderCellDef>
                            MODEL NAME
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRDO036_WORK_W3_MTO_NAME"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_MTO_NAME"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRDO036_WORK_W3_MTO_NAME [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRDO036_WORK_W3_MTO_NAME"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PRDO036_WORK_W3_MTO_NAME, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
       
        <div class="col-lg-12">
            <label class="lbl-header-tbl-data">TOTAL
            </label>
        </div>
        <div class="col-lg-12">
            <div class="form-group row">
                <div class="col-lg-2 border-yellow rounded p-2">
                    <label [magic]="mgc.V_CNT_RESULTTOTAL_V">
                        {{mg.getValue(mgc.V_CNT_RESULTTOTAL_V) }}
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
