<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.SHIPPINGRESULTINQUIRY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Label2)}}
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-2">
                            <div [magic]="mgc.SELECT_DATE_V" *ngIf="mg.getVisible(mgc.SELECT_DATE_V)==='visible'"
                                (change)="task.mgOnRadioSelectionChanged(mgc.SELECT_DATE_V)">
                                <div *ngFor="let o of mg.getItemListValues(mgc.SELECT_DATE_V);">
                                    <label>
                                        <input type="radio" [formControlName]="mgc.SELECT_DATE_V" [value]="o.index" />
                                        {{o.displayValue}}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div [magic]="mgc.SELECT_FORMAT_V" *ngIf="mg.getVisible(mgc.SELECT_FORMAT_V)==='visible'"
                                (change)="task.mgOnRadioSelectionChanged(mgc.SELECT_FORMAT_V)">
                                <div *ngFor="let o of mg.getItemListValues(mgc.SELECT_FORMAT_V);">
                                    <label>
                                        <input type="radio" [formControlName]="mgc.SELECT_FORMAT_V" [value]="o.index" />
                                        {{o.displayValue}}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.YYYYMMDD_V)==='visible'">
                                <label>DD-MM-YYYY</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.YYYYMMDD_V"
                                    [magic]="mgc.YYYYMMDD_V" dateInput />
                            </div>
                            <div class="form-group" *ngIf="mg.getVisible(mgc.YYYYMM_V)==='visible'">
                                <label>MM-YYYY</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.YYYYMM_V"
                                    [magic]="mgc.YYYYMM_V" dateInput />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.SHIPPING_RESULT_INQUIRY">
                </magic-subform>
            </div>
            
        </div>
    </div>
</div>
