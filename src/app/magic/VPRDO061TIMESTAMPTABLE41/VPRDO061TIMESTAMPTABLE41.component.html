<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.VPRDO061TIMESTAMPTABLE41">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Label2)}}
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-2">
                            <div [magic]="mgc.MODE_V" *ngIf="mg.getVisible(mgc.MODE_V)==='visible'"
                                (change)="task.mgOnRadioSelectionChanged(mgc.MODE_V)">
                                <div *ngFor="let o of mg.getItemListValues(mgc.MODE_V);">
                                    <label>
                                        <input type="radio" [formControlName]="mgc.MODE_V" [value]="o.index" />
                                        {{o.displayValue}}
                                    </label>
                                </div>
                            </div>
                        </div>
                       
                        <div class="col-lg-2">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.SELECT_PLN_CD)==='visible'">
                                <label>SELECT PLAN CODE</label>
                                <input class="form-control-ed" [formControlName]="mgc.SELECT_PLN_CD"
                                    [magic]="mgc.SELECT_PLN_CD"  />
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group" *ngIf="mg.getVisible(mgc.ENTRY_PLN_CD)==='visible'">
                                <label>ENTRY PLN</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.ENTRY_PLN_CD"
                                    [magic]="mgc.ENTRY_PLN_CD" dateInput />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.VPRDG061PRD064_GUIDE">
                </magic-subform>
            </div>
            
        </div>
    </div>
</div>
