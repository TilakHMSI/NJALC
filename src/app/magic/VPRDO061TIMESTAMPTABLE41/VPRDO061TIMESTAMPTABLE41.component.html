<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.VPRDO061TIMESTAMPTABLE41"
    >
        <div style="display: flex; flex-direction: row">
            <div
                [magic]="mgc.MODE_V"
                (change)="task.mgOnRadioSelectionChanged(mgc.MODE_V)"
            >
                <div *ngFor="let o of mg.getItemListValues(mgc.MODE_V);">
                    <label>
                        <input
                            type="radio"
                            [formControlName]="mgc.MODE_V"
                            [value]="o.index"
                        />
                        {{o.displayValue}}
                    </label>
                </div>
            </div>
            <button [magic]="mgc.btnexit">
                Back
            </button>
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicDate : mgc.Edit3}}
            </label>
            <div>
                <input
                    [formControlName]="mgc.V_LOCATE_P"
                    [magic]="mgc.V_LOCATE_P"
                    mgFormat
                />
                <mgError [magic]=mgc.V_LOCATE_P> </mgError>
            </div>
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                PGM=VPRDO061
            </label>
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4)
| magicTime : mgc.Edit4}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label5"
                [style.visibility]="mg.getVisible(mgc.Label5)"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label6"
                [style.visibility]="mg.getVisible(mgc.Label6)"
                class="lable_overflow"
            >
                SELECT PLAN CODE
            </label>
            <div>
                <input
                    [formControlName]="mgc.SELECT_PLN_CD"
                    [magic]="mgc.SELECT_PLN_CD"
                    [style.visibility]="mg.getVisible(mgc.SELECT_PLN_CD)"
                    mgFormat
                />
                <mgError [magic]=mgc.SELECT_PLN_CD> </mgError>
            </div>
            <label
                [magic]="mgc.Label8"
                [style.visibility]="mg.getVisible(mgc.Label8)"
                class="lable_overflow"
            >
                ENTRY PLAN CODE
            </label>
            <div>
                <input
                    [formControlName]="mgc.ENTRY_PLN_CD"
                    [magic]="mgc.ENTRY_PLN_CD"
                    [style.visibility]="mg.getVisible(mgc.ENTRY_PLN_CD)"
                    mgFormat
                />
                <mgError [magic]=mgc.ENTRY_PLN_CD> </mgError>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.VPRDG061PRD064_GUIDE">
            </magic-subform>
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.UPDATE">
                12
            </button>
        </div>
    </div>
</div>
