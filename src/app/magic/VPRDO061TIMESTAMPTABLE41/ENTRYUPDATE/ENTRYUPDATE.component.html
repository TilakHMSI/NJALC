<div novalidate [formGroup]="screenFormGroup">
    <div style="display: flex; flex-direction: column" [magic]="mgc.ENTRYUPDATE">
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Label1" class="lable_overflow">
                OPERATION TYPE
            </label>
            <label [magic]="mgc.Label2" class="lable_overflow">
                OPERATION START TIME
            </label>
            <label [magic]="mgc.Label3" class="lable_overflow">
                OPERATION START TYPE
            </label>
            <label [magic]="mgc.Label4" class="lable_overflow">
                OPERATION END TIME
            </label>
            <label [magic]="mgc.Label5" class="lable_overflow">
                OPERATION END TYPE
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <div class="example-container mat-elevation-z8 Table7TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column8" [matColumnDef]="mgc.Column8">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.W64_OPE_TYPE" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.W64_OPE_TYPE" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.W64_OPE_TYPE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.W64_OPE_TYPE"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.W64_OPE_TYPE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column9" [matColumnDef]="mgc.Column9">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="time" [formControlName]="mgc.W64_OPE_START_TIME"
                                            [magic]="mgc.W64_OPE_START_TIME" [rowId]="row.rowId" />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.W64_OPE_START_TIME"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.W64_OPE_START_TIME, row.rowId)
                                        | magicTime : mgc.W64_OPE_START_TIME}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)">
                                        <select [magic]="mgc.W64_OPE_START_TYPE" [rowId]="row.rowId"
                                            [formControlName]="mgc.W64_OPE_START_TYPE">
                                            <option
                                                *ngFor="let o of mg.getItemListValues(mgc.W64_OPE_START_TYPE, row.rowId);"
                                                [selected]="o.index == mg.getValue(mgc.W64_OPE_START_TYPE, row.rowId)"
                                                [value]="o.index">
                                                {{o.displayValue}}
                                            </option>
                                        </select>
                                    </div>
                                    <div *ngIf="!mg.isRowInRowEditing(row)">
                                        <label [magic]="mgc.W64_OPE_START_TYPE" [rowId]="row.rowId">
                                            {{ mg.getDisplayValue(mgc.W64_OPE_START_TYPE, row.rowId) }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column10" [matColumnDef]="mgc.Column10">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="time" [formControlName]="mgc.VPRDO064_WORK_W64_OPE_END_TIME"
                                            [magic]="mgc.VPRDO064_WORK_W64_OPE_END_TIME" [rowId]="row.rowId" />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)"
                                        [magic]="mgc.VPRDO064_WORK_W64_OPE_END_TIME" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.VPRDO064_WORK_W64_OPE_END_TIME, row.rowId)
                                        | magicTime : mgc.VPRDO064_WORK_W64_OPE_END_TIME}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)">
                                        <select [magic]="mgc.VPRDO064_WORK_W64_OPE_END_TYPE" [rowId]="row.rowId"
                                            [formControlName]="mgc.VPRDO064_WORK_W64_OPE_END_TYPE">
                                            <option
                                                *ngFor="let o of mg.getItemListValues(mgc.VPRDO064_WORK_W64_OPE_END_TYPE, row.rowId);"
                                                [selected]="o.index == mg.getValue(mgc.VPRDO064_WORK_W64_OPE_END_TYPE, row.rowId)"
                                                [value]="o.index">
                                                {{o.displayValue}}
                                            </option>
                                        </select>
                                    </div>
                                    <div *ngIf="!mg.isRowInRowEditing(row)">
                                        <label [magic]="mgc.VPRDO064_WORK_W64_OPE_END_TYPE" [rowId]="row.rowId">
                                            {{ mg.getDisplayValue(mgc.VPRDO064_WORK_W64_OPE_END_TYPE, row.rowId) }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
            <label [magic]="mgc.Label6" class="lable_overflow">
            </label>
        </div>
    </div>
</div>
