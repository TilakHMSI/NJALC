<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.FRAMERANGE_UNHOLD_ENTRY"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
                PGM=DispatchUnlock
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit2">
                {{mg.getValue(mgc.Edit2)
| magicDate : mgc.Edit2}}
            </label>
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicTime : mgc.Edit3}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4) }}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.Sub1">
            </magic-subform>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label5"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label6"
                class="lable_overflow"
            >
                Frame From No
            </label>
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                Frame To No
            </label>
            <div>
                <input
                    [formControlName]="mgc.V_Frame"
                    [magic]="mgc.V_Frame"
                    mgFormat
                />
                <mgError [magic]=mgc.V_Frame> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.V_Frame_To_0001"
                    [magic]="mgc.V_Frame_To_0001"
                    mgFormat
                />
                <mgError [magic]=mgc.V_Frame_To_0001> </mgError>
            </div>
            <button [magic]="mgc.b_Submit">
                Submit
            </button>
        </div>
    </div>
</div>
