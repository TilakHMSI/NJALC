<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.MONTHLYPRODRESULTMAINTE">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lbl-sm" class="lable_overflow mb-0">
                            ENGINE FRAME NO DETAIL INQUIRY
                        </label></h3>
                    <button type="button" [magic]="mgc.btnexit"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>EFM</label>
                                <select class="form-control-ed" [magic]="mgc.EFM_V" [formControlName]="mgc.EFM_V">
                                    <option *ngFor="let o of mg.getItemListValues(mgc.EFM_V);"
                                        [selected]="o.index == mg.getValue(mgc.EFM_V)" [value]="o.index">
                                        {{o.displayValue}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group">
                                <label>PROD LINE</label>
                                <input class="form-control-ed" [formControlName]="mgc.PRODLINE_V" type='number'
                                    [magic]="mgc.PRODLINE_V" mgFormat />
                                <mgError [magic]=mgc.PRODLINE_V> </mgError>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <magic-subform [magic]="mgc.MONTHLY_PRDRESULT_MAINTE_HVN">
                </magic-subform>
            </div>
            <div class="col-lg-12">
               <label class="lbl-header-tbl-data" >TOTAL
                        </label>
            </div>
            <div class="col-lg-12">
                <div class="form-group row">
                    <div class="col-lg-2 border-yellow rounded p-2">
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_LAST_M_PROG_V">
                            {{mg.getValue(mgc.V_TOTAL_LAST_M_PROG_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_AFOFF_PLAN_V">
                            {{mg.getValue(mgc.V_TOTAL_AFOFF_PLAN_V)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_AFOFF_V">
                            {{mg.getValue(mgc.V_TOTAL_AFOFF_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_TOTAL_PROG_V">
                            {{mg.getValue(mgc.V_TOTAL_TOTAL_PROG_V)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_WEOFF_V">
                            {{mg.getValue(mgc.V_TOTAL_WEOFF_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_VQOFF_V">
                            {{mg.getValue(mgc.V_TOTAL_VQOFF_V)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_PACK_V">
                            {{mg.getValue(mgc.V_TOTAL_PACK_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_SHIP_V">
                            {{mg.getValue(mgc.V_TOTAL_SHIP_V)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_NVQOFF_STOCK_V">
                            {{mg.getValue(mgc.V_TOTAL_NVQOFF_STOCK_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_RETURN_V">
                            {{mg.getValue(mgc.V_TOTAL_RETURN_V)}}
                        </label>
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_PACKING_STOCK_V">
                            {{mg.getValue(mgc.V_TOTAL_PACKING_STOCK_V)}}
                        </label>
                    </div>
                    <div class="col-lg-2 border-yellow rounded p-2">
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_RESHIP_V">
                            {{mg.getValue(mgc.V_TOTAL_RESHIP_V)}}
                        </label>
                        <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_VQOFF_STOCK_V">
                            {{mg.getValue(mgc.V_TOTAL_VQOFF_STOCK_V)}}
                        </label>
                         <label class="lbl-header-tbl-data" [magic]="mgc.V_TOTAL_EXCOUTGO_V">
                            {{mg.getValue(mgc.V_TOTAL_EXCOUTGO_V)}}
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
