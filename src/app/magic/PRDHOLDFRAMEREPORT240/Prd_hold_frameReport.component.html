<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.Prd_hold_frameReport">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                         Hold Frame Report
                        </label></h3>
                  
                    <div class="d-flex align-items-center">
                   
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">
                                     <div class="col-lg-6">
                    <div class="form-group-sm">
                        <label class="lbl-sm"> RANGE CRITERIA :</label>
                        <select class="form-control-ed" [magic]="mgc.Selection" [formControlName]="mgc.Selection">
                            <option *ngFor="let o of mg.getItemListValues(mgc.Selection);"
                                [selected]="o.index == mg.getValue(mgc.Selection)" [value]="o.index">
                                {{o.displayValue}}
                            </option>
                        </select>
                    </div>
                </div>
                 <div class="col-lg-6">
                  <div class="form-group-sm">
                        <label class="lbl-sm"></label>
                    
                    </div>
                </div>

     <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date From</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Plan_date_From"
                            [magic]="mgc.Plan_date_From" dateInput />

                                </div>
                            </div>

                             <div class="col-lg-6">
                                 <div class="form-group">
                                    <label class="lbl-sm">Date To</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Plan_date_From"
                            [magic]="mgc.Plan_date_From" dateInput />

                                </div>
                            </div>
         
                            

   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.Button_Execute"
                                             [disabled]="mg.isDisabled(mgc.Button_Execute )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                           EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.Button_Cancel"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                       EXIT
                                            </button>

                                        </div>
                                    </div>

       
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
