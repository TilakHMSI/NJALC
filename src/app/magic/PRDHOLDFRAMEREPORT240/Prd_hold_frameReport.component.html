<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.Prd_hold_frameReport"
    >
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label1"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label3"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                Path:- C:\Magic\Temp\Hold_frame_list.txt
            </label>
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                RANGE CRITERIA :
            </label>
            <label
                [magic]="mgc.Label4"
                class="lable_overflow"
            >
                From
            </label>
            <button [magic]="mgc.Button_Execute">
                {{mg.getValue(mgc.Button_Execute)}}
            </button>
            <input
                type="date"
                [formControlName]="mgc.Plan_date_From"
                [magic]="mgc.Plan_date_From"
                dateInput
            />
            <div>
                <select
                    [magic]="mgc.Selection"
                    [formControlName]="mgc.Selection"
                >
                    <option
                        *ngFor="let o of mg.getItemListValues(mgc.Selection);"
                        [selected]="o.index == mg.getValue(mgc.Selection)"
                        [value]="o.index"
                    >
                        {{o.displayValue}}
                    </option>
                </select>
            </div>
            <label
                [magic]="mgc.Label6"
                class="lable_overflow"
            >
                To
            </label>
            <button [magic]="mgc.Button_Cancel">
                {{mg.getValue(mgc.Button_Cancel)}}
            </button>
            <input
                type="date"
                [formControlName]="mgc.Plan_date_To"
                [magic]="mgc.Plan_date_To"
                dateInput
            />
        </div>
    </div>
</div>
