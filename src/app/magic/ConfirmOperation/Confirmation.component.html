<div class="d-flex justify-content-center align-items-center" [magic]="mgc.Confirmation">
        <div class="message-box text-center p-3">
            <!-- Top title -->
            
            <div class="status-box mx-auto py-2 px-3">
                <label class="lbl_Status" [magic]="mgc.Message"
                    class="lable_overflow">
                    {{mg.getValue(mgc.Message) }}
                </label>
            </div>
            <div class="d-flex justify-content-center align-items-center mb-4">
                 <button  class="btn btn-primary font-weight-bold mr-3 btn-wdth" [magic]="mgc.v_Yes">
                Yes
            </button>
            <button  class="btn btn-secondary font-weight-bold mr-3 btn-wdth" [magic]="mgc.v_No">
                No
            </button>
            </div>
           
        </div>
    </div>
