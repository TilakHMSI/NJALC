<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.COLOR_TABLE_MAINT">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            COLOR TABLE MAINTENANCE : CM
                        </label></h3>

                    <div class="d-flex align-items-center">

                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">COLOR CODE</label>
                                    <input [formControlName]="mgc.S9_COLOR_CODE" [magic]="mgc.S9_COLOR_CODE"
                                        class="form-control-editsm" mgFormat />
                                    
                                    <mgError [magic]="mgc.S9_COLOR_CODE"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">COLOR NAME</label>
                                    <input [formControlName]="mgc.S9_COLOR_NAME" [magic]="mgc.S9_COLOR_NAME"
                                        class="form-control-editsm" mgFormat />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">MAIN COLOR </label>
                                    <input [formControlName]="mgc.S9_MAIN_COLOR" [magic]="mgc.S9_MAIN_COLOR"
                                        class="form-control-editsm" mgFormat />
                                    <mgError [magic]="mgc.S9_MAIN_COLOR"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">START DATE</label>
                                    <input type="date" class="form-control-editsm" [formControlName]="mgc.S9_START_DATE"
                                        [magic]="mgc.S9_START_DATE" dateInput />
                                    <mgError [magic]="mgc.S9_START_DATE"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">ABOLITION DATE</label>
                                    <input type="date" class="form-control-editsm"
                                        [formControlName]="mgc.S9_ABOLITION_DATE" [magic]="mgc.S9_ABOLITION_DATE"
                                        dateInput />
                                    <mgError [magic]="mgc.S9_ABOLITION_DATE"> </mgError>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.btnSave"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
