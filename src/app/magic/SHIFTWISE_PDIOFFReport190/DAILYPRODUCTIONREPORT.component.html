<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.DAILYPRODUCTIONREPORT"
    >
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit1">
                {{mg.getValue(mgc.Edit1) }}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label2"
                class="lable_overflow"
            >
                <<
                    SHIFTWISE
                    PDI-OFF
                    REPORT
                >>
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <div
                [magic]="mgc.Group6"
                class="container_border"
                style="display: flex; flex-direction: column"
            >
                <div style="display: flex; flex-direction: row">
                    <label
                        [magic]="mgc.Label7"
                        class="lable_overflow"
                    >
                        DATE FROM :
                    </label>
                    <input
                        type="date"
                        [formControlName]="mgc.v_DateFrom"
                        [magic]="mgc.v_DateFrom"
                        dateInput
                    />
                </div>
                <div style="display: flex; flex-direction: row">
                    <label
                        [magic]="mgc.Label9"
                        class="lable_overflow"
                    >
                        DATE TO :
                    </label>
                    <input
                        type="date"
                        [formControlName]="mgc.v_DateTo"
                        [magic]="mgc.v_DateTo"
                        dateInput
                    />
                </div>
                <div style="display: flex; flex-direction: row">
                    <label
                        [magic]="mgc.Label11"
                        class="lable_overflow"
                    >
                        PRODUCTION LINE:
                    </label>
                    <div>
                        <select
                            [magic]="mgc.v_Prod_Line"
                            [formControlName]="mgc.v_Prod_Line"
                        >
                            <option
                                *ngFor="let o of mg.getItemListValues(mgc.v_Prod_Line);"
                                [selected]="o.index == mg.getValue(mgc.v_Prod_Line)"
                                [value]="o.index"
                            >
                                {{o.displayValue}}
                            </option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <button [magic]="mgc.v_Exec">
                E\XEC
            </button>
            <button [magic]="mgc.v_Exit">
                E\XIT
            </button>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Edit4"
                [style.visibility]="mg.getVisible(mgc.Edit4)"
            >
                {{mg.getValue(mgc.Edit4) }}
            </label>
            <label
                [magic]="mgc.Edit3"
                [style.visibility]="mg.getVisible(mgc.Edit3)"
            >
                {{mg.getValue(mgc.Edit3) }}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label5"
                [style.visibility]="mg.getVisible(mgc.Label5)"
                class="lable_overflow"
            >
                SHIFT:
            </label>
            <div>
                <select
                    [magic]="mgc.v_Shift"
                    [style.visibility]="mg.getVisible(mgc.v_Shift)"
                    [formControlName]="mgc.v_Shift"
                >
                    <option
                        *ngFor="let o of mg.getItemListValues(mgc.v_Shift);"
                        [selected]="o.index == mg.getValue(mgc.v_Shift)"
                        [value]="o.index"
                    >
                        {{o.displayValue}}
                    </option>
                </select>
            </div>
            <div>
                <select
                    [magic]="mgc.v_Page_type"
                    [style.visibility]="mg.getVisible(mgc.v_Page_type)"
                    [formControlName]="mgc.v_Page_type"
                >
                    <option
                        *ngFor="let o of mg.getItemListValues(mgc.v_Page_type);"
                        [selected]="o.index == mg.getValue(mgc.v_Page_type)"
                        [value]="o.index"
                    >
                        {{o.displayValue}}
                    </option>
                </select>
            </div>
        </div>
    </div>
</div>
