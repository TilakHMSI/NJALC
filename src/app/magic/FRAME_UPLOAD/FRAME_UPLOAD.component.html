<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.FRAME_UPLOAD">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            PGM=DispatchStop
                        </label></h3>
                         <input class="form-control" style="color:white; width:auto;background-color:transparent;border: none;"
                        [formControlName]="mgc.Edit4" [magic]="mgc.Edit4" mgFormat />
                           <div class="d-flex align-items-center">
                        <label [magic]="mgc.Edit2" class="mb-0 mr-3">
                            {{mg.getValue(mgc.Edit2)
                            | magicDate : mgc.Edit2}}
                        </label>
                        <label [magic]="mgc.Edit3" class="mb-0 mr-1">
                            {{mg.getValue(mgc.Edit3)
                            | magicTime : mgc.Edit3}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
           
                </div>
            </div>
 <div class="col-lg-12">
            <magic-subform [magic]="mgc.FRAME_DETAIL_VIEW">
            </magic-subform>
        </div>
        <input style="display:none" [formControlName]="mgc.vBlob64Format" [magic]="mgc.vBlob64Format" mgFormat />
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        

                               <div class="form-group row">
                    <label class="col-lg-2 col-sm-12 col-form-label mt-2">File Name</label>
                    <div class="col-lg-5 col-sm-12 form-group">
                        <input class="form-control" type="text" [formControlName]="mgc.vFileName" [magic]="mgc.vFileName" placeholder="Select file to upload" mgFormat />
                        <mgError [magic]="mgc.vFileName"> </mgError>
                    </div>
                    <div class="col-lg-4 col-sm-12 form-group">
                        <button class="btn btn-sm btn-warning mr-5" magic="Attachment">
                            <label style="margin-bottom: 0;">
                                Browse
                                <input type="file" style="display:none" accept=".xls,.xlsx,.csv" (change)="fileUpload($event)" />
                            </label>
                        </button>
                        <button class="btn btn-sm btn-success mr-2" *ngIf="mg.getVisible(mgc.b_UploadFile_0001)==='visible'"
                         [magic]="mgc.b_UploadFile_0001" >
                            <i class="flaticon2-arrow-up"></i>Upload File
                        </button>
                    </div>
                </div>
                          
                   

                        
                    </div>

                </div>
            </div>
        </div>
       
    </div>
</div>
