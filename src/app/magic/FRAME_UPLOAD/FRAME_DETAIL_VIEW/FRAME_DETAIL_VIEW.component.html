<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.FRAME_DETAIL_VIEW">
               
 
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
 
                     <ng-container [magic]="mgc.Column2" [matColumnDef]="mgc.Column2">
                        <mat-header-cell *matHeaderCellDef>
                            FRAME NUMBER
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.FRAMENUMBER" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.FRAMENUMBER" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.FRAMENUMBER, row.rowId)" mgFormat />
                                        <mgError [magic]=mgc.FRAMENUMBER [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.FRAMENUMBER"
                                            [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.FRAMENUMBER, row.rowId)">
                                            {{mg.getValue(mgc.FRAMENUMBER, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                              <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                           MODEL CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.MODELCODE" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.MODELCODE" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.MODELCODE, row.rowId)" mgFormat />
                                        <mgError [magic]=mgc.MODELCODE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.MODELCODE"
                                            [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.MODELCODE, row.rowId)">
                                            {{mg.getValue(mgc.MODELCODE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                      <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                          MODEL NAME
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.MODELNAME" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.MODELNAME" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.MODELNAME, row.rowId)" mgFormat />
                                        <mgError [magic]=mgc.MODELNAME [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.MODELNAME"
                                            [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.MODELNAME, row.rowId)">
                                            {{mg.getValue(mgc.MODELNAME, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                      <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                          COLOR CODE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.COLORCODE" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.COLORCODE" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.COLORCODE, row.rowId)" mgFormat />
                                        <mgError [magic]=mgc.COLORCODE [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.COLORCODE"
                                            [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.COLORCODE, row.rowId)">
                                            {{mg.getValue(mgc.COLORCODE, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            REPAIR IN DATE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="date" [formControlName]="mgc.REPAIRINDATE"
                                            [magic]="mgc.REPAIRINDATE" [rowId]="row.rowId" dateInput />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.REPAIRINDATE"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.REPAIRINDATE, row.rowId)
                                        | magicDate : mgc.REPAIRINDATE}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    
                             <ng-container [magic]="mgc.Column7" [matColumnDef]="mgc.Column7">
                        <mat-header-cell class="header-row" *matHeaderCellDef>
                            REPAIR IN TIME
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer" class="table_row">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="time" [formControlName]="mgc.REPAIRINTIME"
                                            [magic]="mgc.REPAIRINTIME" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.REPAIRINTIME, row.rowId)" step=1 />
                                    </div>
                                    <label class=" font-size-h4" *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.REPAIRINTIME"
                                        [rowId]="row.rowId"
                                        [style.visibility]="mg.getVisible(mgc.REPAIRINTIME, row.rowId)">
                                        {{mg.getValue(mgc.REPAIRINTIME, row.rowId)
                                        | magicTime : mgc.REPAIRINTIME}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>

                     
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
