<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.FrameWiseDefectReport">
        <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <h3><label class="lable_overflow mb-0">
                                   PENDING FRAME REPORT 
                                </label></h3>
                            <label></label>

                    
                            <div class="d-flex">
                              
 <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                      
                            <div class="col-lg-12 col-xxl-12">
                                <div class="form-group row">
                               
                                    
                                      <div class="col-lg-10">
                                       <div class="form-group-sm">
                        <label class="lbl-sm">FROM DATE</label>
                        <input class="form-control-ed" type="date" [formControlName]="mgc.vFrom_Date"
                            [magic]="mgc.vFrom_Date" dateInput />
                           
                    </div>
                                     

                                    </div>

                                      <div class="col-lg-10">
                                       <div class="form-group-sm">
                        <label class="lbl-sm">TO DATE</label>
                            <input class="form-control-ed" type="date" [formControlName]="mgc.vTo_Date"
                            [magic]="mgc.vTo_Date" dateInput />
                    </div>
                                     

                                    </div>


                                    <div class="col-lg-12 text-center">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.v_Exec"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                                EXEC
                                            </button>
                                            <button type="button" [magic]="mgc.v_Exit"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                              EXIT
                                            </button>

                                        </div>
                                    </div>



                                </div>

                         
                        
                    </div>
                </div>
            </div>
        </div>
        </div>
