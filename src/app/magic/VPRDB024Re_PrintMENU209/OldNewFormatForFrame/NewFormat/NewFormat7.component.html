<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.NewFormat7">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                          New Format 7
                        </label></h3>
                  
                    <div class="d-flex align-items-center">                 
                        <button type="button" [magic]="mgc.btn_Close"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                    
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">

                    <div class="col-lg-12">
                        <div class="form-group row">

                              <div class="col-lg-12">
                                <div class="form-group row">
              
                                    <div class="col-lg-12">
                                        <label>
                                           CHOOSE THE FORMAT IN WHICH CARDS ARE TO BE PRINTED
                                        </label>
                                    </div>


                                </div>
                            </div>

   <div class="col-lg-12 text-center" style="margin-top: 5%;">
                                        <div class="form-group d-flex justify-content-center">

                                            <button type="button" [magic]="mgc.v_Old_new"
                                             [disabled]="mg.isDisabled(mgc.v_Old_new )"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                               OLD FORMAT
                                            </button>
                                            <button type="button" [magic]="mgc.v_New_new"
                                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                          NEW FORMAT
                                            </button>
                                           

                                        </div>
                                    </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
