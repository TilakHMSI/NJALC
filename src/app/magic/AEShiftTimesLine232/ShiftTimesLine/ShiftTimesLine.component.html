<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.ShiftTimesLine">
        <div
            class="container-fluid d-flex align-items-center justify-content-sm-between justify-content-center flex-wrap flex-sm-nowrap">
            <div class="d-flex align-items-center flex-wrap mr-1">
                <div class="d-flex align-items-center ser-bt1">
                    <!-- <div></div><button type="button" class="btn btn-sm btn-success mb-4" [magic]="mgc.btnAdd"
                        *ngIf="mg.getVisible(mgc.btnAdd)==='visible'">
                        <i class="flaticon-app mr-2"></i>Add
                    </button> -->
                </div>
            </div>
        </div>
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column2" [matColumnDef]="mgc.Column2">
                        <mat-header-cell *matHeaderCellDef>
                            ProdLine 
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.ShiftTimesLine_ProdLine"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.ShiftTimesLine_ProdLine"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.ShiftTimesLine_ProdLine [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.ShiftTimesLine_ProdLine"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.ShiftTimesLine_ProdLine, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                            Shift
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input class="form-control-ed" [formControlName]="mgc.ShiftTimesLine_SHIFT"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.ShiftTimesLine_SHIFT"
                                            [rowId]="row.rowId" mgFormat rangevalidator />
                                        <mgError [magic]=mgc.ShiftTimesLine_SHIFT [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.ShiftTimesLine_SHIFT"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.ShiftTimesLine_SHIFT, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            Shift Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.ShiftStartTime"
                                            [magic]="mgc.ShiftStartTime" [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.ShiftStartTime"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.ShiftStartTime, row.rowId)
                                        | magicTime : mgc.ShiftStartTime}}
                                    </label>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.ShiftEndTime"
                                            [magic]="mgc.ShiftEndTime" [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.ShiftEndTime"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.ShiftEndTime, row.rowId)
                                        | magicTime : mgc.ShiftEndTime}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            Brk1 Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk1Start" [magic]="mgc.Brk1Start"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk1Start"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk1Start, row.rowId)
                                        | magicTime : mgc.Brk1Start}}
                                    </label>
                                </div>
                           
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk1End" [magic]="mgc.Brk1End"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk1End" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk1End, row.rowId)
                                        | magicTime : mgc.Brk1End}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column8" [matColumnDef]="mgc.Column8">
                        <mat-header-cell *matHeaderCellDef>
                            Brk2 Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk2Start" [magic]="mgc.Brk2Start"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk2Start"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk2Start, row.rowId)
                                        | magicTime : mgc.Brk2Start}}
                                    </label>
                                </div>
                          
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk2End" [magic]="mgc.Brk2End"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk2End" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk2End, row.rowId)
                                        | magicTime : mgc.Brk2End}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column10" [matColumnDef]="mgc.Column10">
                        <mat-header-cell *matHeaderCellDef>
                            Brk3 Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk3Start" [magic]="mgc.Brk3Start"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk3Start"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk3Start, row.rowId)
                                        | magicTime : mgc.Brk3Start}}
                                    </label>
                                </div>
                            
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk3End" [magic]="mgc.Brk3End"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk3End" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk3End, row.rowId)
                                        | magicTime : mgc.Brk3End}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column12" [matColumnDef]="mgc.Column12">
                        <mat-header-cell *matHeaderCellDef>
                            Brk4 Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk4Start" [magic]="mgc.Brk4Start"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk4Start"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk4Start, row.rowId)
                                        | magicTime : mgc.Brk4Start}}
                                    </label>
                                </div>
                            
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk4End" [magic]="mgc.Brk4End"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk4End" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk4End, row.rowId)
                                        | magicTime : mgc.Brk4End}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column14" [matColumnDef]="mgc.Column14">
                        <mat-header-cell *matHeaderCellDef>
                            Brk5 Start | End
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk5tSart" [magic]="mgc.Brk5tSart"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk5tSart"
                                        [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk5tSart, row.rowId)
                                        | magicTime : mgc.Brk5tSart}}
                                    </label>
                                </div>
                            
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input class="form-control-ed" type="time" [formControlName]="mgc.Brk5End" [magic]="mgc.Brk5End"
                                            [rowId]="row.rowId" step=1 />
                                    </div>
                                    <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Brk5End" [rowId]="row.rowId">
                                        {{mg.getValue(mgc.Brk5End, row.rowId)
                                        | magicTime : mgc.Brk5End}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column33" [matColumnDef]="mgc.Column33">
                        <mat-header-cell *matHeaderCellDef>
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: column" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="!mg.isRowInRowEditing(row)"
                                    [style.visibility]="mg.getVisible(mgc.EnterRowEditing, row.rowId)"
                                    [magic]="mgc.EnterRowEditing" [rowId]="row.rowId">
                                    <i class="icon-xl far fa-edit text-info" aria-hidden="true"></i>
                                </button>
                            
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.SaveRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl far fa-save text-success" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.CancelRowEditing"
                                    [rowId]="row.rowId">
                                    <i class="icon-xl fas fa-eraser text-danger" aria-hidden="true"></i>
                                </button>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10"  [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
