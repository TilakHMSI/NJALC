<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.HelpInformation">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            Help Information
                        </label></h3>
                    <div class="d-flex align-items-center">

                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 text-center" style="margin-top: 5%;">
                        <label [magic]="mgc.Label2">
                            Frame & Engine Information in PRD005 Table is stored in following way:
                            Row1 -> Frame Number, Engine Number
                            Row2 -> Engine Number, Frame Number
                            During Af-Off, Frame Number is united against Engine Number and vice versa.
                        </label>
                        <label [magic]="mgc.Label1" >
                        </label>
                    </div>
                    <div class="col-lg-12 text-center" style="margin-top: 5%;">
                        <label [magic]="mgc.Label3">
                            Utility works to find all data mismatch for Row 2 option.
                            Following process is used:
                            > Find Engine Number with blank Frame Number.
                            > Find Frame Number for above Engine Number.
                            > Update Frame Number against the Engine Number.
                        </label>
                    </div>
                    <div class="col-lg-12 text-center" style="margin-top: 5%;">
                        <label [magic]="mgc.Label4" >
                            Create Date: 04-Oct-2009
                        </label>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>
